name: Update Tengkong World Archive

on:

  workflow_dispatch:

  schedule:
    # 10:10 Taiwan time (UTC+8) == 02:10 UTC.
    - cron: '10 2 * * *'
  
permissions:
  contents: write

concurrency:
  group: sync-blogger-archive
  cancel-in-progress: false

jobs:

  sync:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: tengkong-archive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: tengkong-archive/requirements.txt

      - name: Install Dependencies
        working-directory: tengkong-archive
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Sync Script
        working-directory: tengkong-archive
        run: |
          python3 scripts/sync.py

      - name: Verify Build
        working-directory: tengkong-archive
        run: |
          echo "Checking build output..."
          test -d build
          test -f build/index.html

          echo "Build directory:"
          ls -la build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: tengkong-archive/build/

      - name: Checkout deployment repository
        uses: actions/checkout@v4
        with:
          repository: tengkongworld/tengkongworld.github.io
          token: ${{ secrets.DEPLOY_TOKEN }}
          path: tengkongworld.github.io

      - name: Configure deployment git identity
        working-directory: tengkongworld.github.io
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Deploy generated site
        working-directory: tengkong-archive
        run: |
          python3 deploy.py
