name: Update Tengkong World Archive

on:

  workflow_dispatch:

  schedule:
    # 10:10 Taiwan time (UTC+8) == 02:10 UTC.
    - cron: '10 2 * * *'
  
permissions:
  contents: write

concurrency:
  group: sync-blogger-archive
  cancel-in-progress: false

jobs:

  sync:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Sync Script
        run: |
          python scripts/sync.py

      - name: Verify Build
        run: |
          echo "Checking build output..."
          test -d build
          test -f build/index.html

          echo "Build directory:"
          ls -la build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: build/    

      - name: Checkout deployment repository
        uses: actions/checkout@v4
        with:
          repository: tengkongworld/tengkongworld.github.io
          token: ${{ secrets.DEPLOY_TOKEN }}
          path: deploy

      - name: Clean deployment repository
        run: |
          echo "Cleaning deploy (safe mode)..."

          find deploy/* -maxdepth 0 \
            -not -name ".git" \
            -exec rm -rf {} +

          echo "Deploy cleaned"

      - name: Copy build to deployment repository
        run: |
          echo "Copying build..."

          cp -R build/. deploy/

          echo "Deployment repository contents:"
          ls -la deploy  

      - name: Commit and push deployment
        working-directory: deploy
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .

          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Auto deploy website"
            git push origin main
          fi          
